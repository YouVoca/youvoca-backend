services:
  postgres:
    image: postgres:17-alpine
    container_name: youvoca-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: youvoca
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - youvoca-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d youvoca"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  youvoca-postgres-data:
